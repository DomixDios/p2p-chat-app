<!DOCTYPE html>
<html lang="es" class="dark-theme">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>P2P Chat</title>
  <link rel="stylesheet" href="style.css" />

  <!--
    PeerJS: librería WebRTC que abstrae el manejo de señalización,
    conexiones peer-to-peer y llamadas de audio/video.
    Usa el servidor público gratuito de PeerJS Cloud (0.peerjs.com)
    como signalling server. No requiere configuración adicional.
  -->
  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js" defer></script>
</head>
<body>
  <div class="app-container">

    <!-- ===== SIDEBAR IZQUIERDO: Salas ===== -->
    <aside class="sidebar sidebar-left glass-panel" id="sidebarLeft">
      <div class="sidebar-header">
        <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
        </svg>
        <h2>Salas</h2>
      </div>

      <button class="btn btn-primary glass-btn" id="btnCreateRoom">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        Nueva Sala
      </button>

      <div class="room-list" id="roomList"></div>

      <div class="current-room-badge glass-panel" id="currentRoomBadge">
        <span class="label">Sala actual</span>
        <span class="room-id" id="currentRoomId">—</span>
      </div>

      <button class="btn btn-secondary glass-btn" id="btnInvite">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
        </svg>
        Invitar
      </button>
    </aside>

    <!-- ===== SIDEBAR DERECHO: Usuarios ===== -->
    <aside class="sidebar sidebar-right glass-panel" id="sidebarRight">
      <div class="sidebar-header">
        <h2>Conectados</h2>
        <span class="badge" id="userCount">0</span>
      </div>

      <div class="username-section glass-panel">
        <span class="label">Tu nombre</span>
        <div class="username-row">
          <span class="username-display" id="usernameDisplay">Sin nombre</span>
          <input type="text" class="username-input" id="usernameInput" placeholder="Tu nombre..." maxlength="20" />
          <button class="btn-icon" id="btnEditUsername" title="Editar nombre">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
              <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
            </svg>
          </button>
        </div>
      </div>

      <ul class="user-list" id="userList">
        <li class="user-item own">
          <span class="status-dot online"></span>
          <span class="username" id="myPeerId">Conectando…</span>
        </li>
      </ul>

      <div style="display:flex;gap:6px;margin-top:auto">
        <button class="btn btn-secondary glass-btn" id="btnCopyId" title="Copiar mi ID" style="flex:1">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
          </svg>
          Mi ID
        </button>
        <button class="btn btn-secondary glass-btn" id="btnTheme" style="flex:1">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
          Tema
        </button>
      </div>
    </aside>

    <!-- ===== ÁREA PRINCIPAL: Video + Chat ===== -->
    <main class="main-content" id="mainContent">

      <button class="hamburger glass-btn" id="btnHamburger" aria-label="Menú">
        <span></span><span></span><span></span>
      </button>

      <div class="media-bar glass-panel" id="mediaBar">
        <button class="ctrl-btn glass-btn" id="btnMic" title="Micrófono" data-active="false">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="9" y="2" width="6" height="11" rx="3"/><path d="M5 10a7 7 0 0 0 14 0"/><line x1="12" y1="19" x2="12" y2="22"/>
          </svg>
        </button>
        <button class="ctrl-btn glass-btn" id="btnCam" title="Cámara" data-active="false">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
          </svg>
        </button>
        <button class="ctrl-btn glass-btn" id="btnScreen" title="Compartir pantalla" data-active="false">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/>
          </svg>
        </button>
      </div>

      <div class="video-grid" id="videoGrid">
        <div class="video-container glass-panel" id="localVideoContainer">
          <video id="localVideo" autoplay muted playsinline></video>
          <span class="video-label">Tú</span>
        </div>
      </div>

      <div class="chat-section glass-panel">
        <div class="chat-messages" id="chatMessages">
          <div class="message system">
            <span>Bienvenido a la sala. Comparte el enlace para invitar a más personas.</span>
          </div>
        </div>
        <form class="chat-input" id="chatForm">
          <input type="text" id="chatInput" placeholder="Escribe un mensaje..." autocomplete="off" />
          <button type="submit" class="btn glass-btn" id="btnSend">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
          </button>
        </form>
      </div>
    </main>
  </div>

  <!-- ===== BOTTOM NAV MÓVIL ===== -->
  <nav class="mobile-nav" id="mobileNav">
    <button class="mob-nav-btn" data-view="rooms">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      <span>Salas</span>
    </button>
    <button class="mob-nav-btn active" data-view="chat">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
      <span>Chat</span>
    </button>
    <button class="mob-nav-btn" data-view="users">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
      </svg>
      <span>Usuarios</span>
    </button>
  </nav>

  <div class="overlay" id="overlay"></div>
  <div class="toast-container" id="toastContainer"></div>

  <script type="module" src="app.js"></script>
</body>
</html>
